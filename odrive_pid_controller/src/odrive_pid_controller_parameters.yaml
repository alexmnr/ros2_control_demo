odrive_pid_controller:
  joints: {
    type: string_array,
    default_value: [],
    description: "Specifies joints used by the controller",
    read_only: true,
    validation: {
      unique<>: null,
      not_empty<>: null,
  }
}
  gains:
    __map_joints:
      position:
        p:
          type: double
          default_value: 0.0
          description: "Proportional gain for the position loop."
        i:
          type: double
          default_value: 0.0
          description: "Integral gain for the position loop."
        d:
          type: double
          default_value: 0.0
          description: "Derivative gain for the position loop."
        min_output:
          type: double
          default_value: -.inf
          description: "Minimum output limit for the position PID."
        max_output:
          type: double
          default_value: .inf
          description: "Maximum output limit for the position PID."
      velocity:
        p:
          type: double
          default_value: 0.0
          description: "Proportional gain for the velocity loop."
        i:
          type: double
          default_value: 0.0
          description: "Integral gain for the velocity loop."
        d:
          type: double
          default_value: 0.0
          description: "Derivative gain for the velocity loop."
        min_output:
          type: double
          default_value: -.inf
          description: "Minimum output limit for the velocity PID."
        max_output:
          type: double
          default_value: .inf
          description: "Maximum output limit for the velocity PID."
